<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0" />

  <title>UPI Payment Gateway</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>

    body {

      background: #081b63;

      font-family: sans-serif;

    }

    .glass {

      background: rgba(255,255,255,0.97);

      backdrop-filter: blur(10px);

    }

  </style>

</head>

<body class="min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md">

    <!-- MAIN CARD -->

    <div class="glass rounded-[35px] overflow-hidden shadow-2xl">

      <!-- TOP -->

      <div class="bg-[#dff4ff] p-5">

        <div class="flex gap-4">

          <!-- ICON -->

          <div
            class="bg-white rounded-3xl w-28 h-28 flex items-center justify-center shadow">

            <i
              class="fa-solid fa-basket-shopping text-6xl text-gray-700">
            </i>

          </div>

          <!-- DETAILS -->

          <div class="flex-1 space-y-3">

            <div
              class="bg-white rounded-2xl p-4 shadow">

              <p class="text-4xl font-black leading-none">

                JAYADEEP
                <br>
                KHETRI

              </p>

            </div>

            <div
              class="bg-white rounded-2xl p-4 shadow">

              <p class="text-4xl font-black">

                ₹1

              </p>

            </div>

          </div>

        </div>

      </div>

      <!-- CENTER -->

      <div class="bg-[#11b3e9] pt-10 pb-20 px-5">

        <div
          class="bg-white rounded-[35px] p-6 shadow-xl text-center">

          <!-- LOGO -->

          <h1 class="text-5xl font-black">

            <span class="text-[#002970]">
              Pay
            </span>

            <span class="text-[#00baf2]">
              tm
            </span>

          </h1>

          <p class="text-2xl font-bold mt-1">

            Accepted Here

          </p>

          <!-- QR -->

          <div class="mt-5">

            <img
              src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=upi%3A%2F%2Fpay%3Fpa%3Dpaytmqrpmivwx2rxg%40paytm%26pn%3DJAYADEEP%2520KHETRI%26am%3D1%26cu%3DINR"
              class="w-72 h-72 mx-auto" />

          </div>

          <!-- UPI -->

          <div class="mt-5">

            <p class="text-2xl">

              UPI ID:
              <span class="font-semibold">

                paytmqrpmivwx2rxg@paytm

              </span>

            </p>

          </div>

          <!-- BUTTONS -->

          <div class="mt-6 space-y-3">

            <!-- PAY -->

            <a
              href="upi://pay?pa=paytmqrpmivwx2rxg@paytm&pn=JAYADEEP%20KHETRI&am=1&cu=INR"
              class="w-full bg-[#002970] hover:bg-[#001d4d] text-white py-4 rounded-2xl font-bold text-lg flex items-center justify-center gap-3">

              <i class="fa-solid fa-mobile-screen"></i>

              Pay Now

            </a>

            <!-- COPY -->

            <button
              onclick="copyUPI()"
              class="w-full bg-black hover:bg-gray-900 text-white py-4 rounded-2xl font-bold text-lg flex items-center justify-center gap-3">

              <i class="fa-solid fa-copy"></i>

              Copy UPI ID

            </button>

          </div>

          <!-- STEP -->

          <div class="mt-8">

            <p class="text-gray-500 font-semibold">

              After payment enter UTR number

            </p>

          </div>

          <!-- UTR -->

          <div class="mt-4">

            <input
              id="utrInput"
              type="text"
              placeholder="Enter UTR / Order ID"
              class="w-full border-2 border-gray-200 rounded-2xl px-5 py-4 text-center text-lg font-semibold outline-none focus:border-[#00baf2]" />

          </div>

          <!-- VERIFY -->

          <button
            id="verifyBtn"
            class="mt-5 w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-2xl font-bold text-xl">

            Verify Payment

          </button>

          <!-- STATUS -->

          <div
            id="statusBox"
            class="hidden mt-8">

            <!-- LOADING -->

            <div id="loadingBox">

              <div
                class="w-16 h-16 border-4 border-gray-300 border-t-green-600 rounded-full animate-spin mx-auto">
              </div>

              <h2 class="text-2xl font-bold mt-4">

                Verifying Payment

              </h2>

              <p class="text-gray-500 mt-2">

                Please wait...

              </p>

              <div
                id="timer"
                class="text-4xl font-black mt-5">

                02:00

              </div>

            </div>

            <!-- SUCCESS -->

            <div
              id="successBox"
              class="hidden">

              <div
                class="w-24 h-24 rounded-full bg-green-100 flex items-center justify-center mx-auto">

                <i
                  class="fa-solid fa-check text-5xl text-green-600">
                </i>

              </div>

              <h2
                class="text-3xl font-black mt-5">

                Payment Successful

              </h2>

              <p class="text-gray-500 mt-3">

                Payment verified successfully

              </p>

              <a
                href="https://google.com"
                target="_blank"
                class="mt-6 inline-flex bg-green-600 hover:bg-green-700 text-white px-8 py-4 rounded-2xl font-bold text-lg items-center gap-3">

                <i class="fa-solid fa-download"></i>

                Download

              </a>

            </div>

            <!-- FAILED -->

            <div
              id="failedBox"
              class="hidden">

              <div
                class="w-24 h-24 rounded-full bg-red-100 flex items-center justify-center mx-auto">

                <i
                  class="fa-solid fa-xmark text-5xl text-red-600">
                </i>

              </div>

              <h2
                class="text-3xl font-black mt-5">

                Verification Failed

              </h2>

              <p class="text-gray-500 mt-3">

                UTR not found

              </p>

              <button
                onclick="location.reload()"
                class="mt-6 bg-black text-white px-8 py-4 rounded-2xl font-bold">

                Try Again

              </button>

            </div>

          </div>

          <!-- FOOTER -->

          <div class="mt-10">

            <p class="text-sm text-gray-400">

              100% Secure Payments

            </p>

          </div>

        </div>

      </div>

    </div>

  </div>

  <!-- FIREBASE -->

  <script type="module">

    import { initializeApp }
      from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";

    import {
      getFirestore,
      collection,
      addDoc,
      onSnapshot,
      doc
    }
      from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // FIREBASE CONFIG

    const firebaseConfig = {

      apiKey: "AIzaSyAAMOrHK8W6S4D_kFpJGHOiLX9n1V8clTU",

      authDomain: "paymentgetaway-87367.firebaseapp.com",

      projectId: "paymentgetaway-87367",

      storageBucket: "paymentgetaway-87367.firebasestorage.app",

      messagingSenderId: "692056586768",

      appId: "1:692056586768:web:7216718e3bc6ea1fc3a895"

    };

    const app =
      initializeApp(firebaseConfig);

    const db =
      getFirestore(app);

    // COPY

    window.copyUPI = function () {

      navigator.clipboard.writeText(
        "paytmqrpmivwx2rxg@paytm"
      );

      alert("UPI ID Copied");

    };

    // VERIFY

    let timerInterval;

    let unsubscribe = null;

    document
      .getElementById("verifyBtn")
      .addEventListener("click", async () => {

        const utr =
          document
          .getElementById("utrInput")
          .value
          .trim();

        if (!utr) {

          alert("Enter valid UTR");

          return;

        }

        const btn =
          document
          .getElementById("verifyBtn");

        btn.disabled = true;

        btn.innerHTML =
          `<i class="fa-solid fa-spinner fa-spin"></i> Verifying`;

        try {

          // SAVE ORDER

          const docRef =
            await addDoc(
              collection(db, "purchases"),
              {

                utr: utr,

                status: "pending",

                timestamp: Date.now()

              }
            );

          // SHOW STATUS

          document
            .getElementById("statusBox")
            .classList
            .remove("hidden");

          // START TIMER

          startTimer(120);

          // REALTIME

          unsubscribe =
            onSnapshot(
              doc(
                db,
                "purchases",
                docRef.id
              ),

              (snapshot) => {

                if (!snapshot.exists())
                  return;

                const data =
                  snapshot.data();

                if (
                  data.status ===
                  "approved"
                ) {

                  clearInterval(
                    timerInterval
                  );

                  showSuccess();

                  if (unsubscribe)
                    unsubscribe();

                }

              }
            );

        } catch (err) {

          console.error(err);

          alert(
            "Database Error"
          );

          btn.disabled = false;

          btn.innerHTML =
            "Verify Payment";

        }

      });

    // TIMER

    function startTimer(seconds) {

      let time = seconds;

      timerInterval =
        setInterval(() => {

          const min =
            String(
              Math.floor(time / 60)
            ).padStart(2, "0");

          const sec =
            String(
              time % 60
            ).padStart(2, "0");

          document
            .getElementById("timer")
            .innerText =
            `${min}:${sec}`;

          time--;

          if (time < 0) {

            clearInterval(
              timerInterval
            );

            showFailed();

            if (unsubscribe)
              unsubscribe();

          }

        }, 1000);

    }

    // SUCCESS

    function showSuccess() {

      document
        .getElementById("loadingBox")
        .classList
        .add("hidden");

      document
        .getElementById("failedBox")
        .classList
        .add("hidden");

      document
        .getElementById("successBox")
        .classList
        .remove("hidden");

    }

    // FAILED

    function showFailed() {

      document
        .getElementById("loadingBox")
        .classList
        .add("hidden");

      document
        .getElementById("successBox")
        .classList
        .add("hidden");

      document
        .getElementById("failedBox")
        .classList
        .remove("hidden");

    }

  </script>

</body>

</html>
